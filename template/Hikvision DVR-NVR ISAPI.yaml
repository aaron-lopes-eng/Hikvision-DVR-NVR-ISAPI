              manual_close: 'YES'
        - uuid: 577d6ed3bd1f400bbda742915ebce526
          name: 'Firmware release date'
          type: DEPENDENT
          key: hikvision.dvr.firmware.date
          value_type: TEXT
          preprocessing:
            - type: XMLPATH
              parameters:
                - 'string(//*[local-name()=''firmwareReleasedDate''])'
          master_item:
            key: hikvision.dvr.system.deviceinfo
        - uuid: be91ad67b0de40719d7ac530eab55fb3
          name: 'MAC address'
          type: DEPENDENT
          key: hikvision.dvr.mac
          value_type: TEXT
          preprocessing:
            - type: XMLPATH
              parameters:
                - 'string(//*[local-name()=''macAddress''])'
          master_item:
            key: hikvision.dvr.system.deviceinfo
        - uuid: ac17d2daa5f440c595995160934ba740
          name: 'Device model'
          type: DEPENDENT
          key: hikvision.dvr.model
          value_type: TEXT
          preprocessing:
            - type: XMLPATH
              parameters:
                - 'string(//*[local-name()=''model''])'
          master_item:
            key: hikvision.dvr.system.deviceinfo
        - uuid: 11146780a2a64bc78b039af724c669bc
          name: 'Device name'
          type: DEPENDENT
          key: hikvision.dvr.name
          value_type: TEXT
          preprocessing:
            - type: XMLPATH
              parameters:
                - 'string(//*[local-name()=''deviceName''])'
          master_item:
            key: hikvision.dvr.system.deviceinfo
        - uuid: 2381777e64204f3da2b027ae522e5417
          name: 'Primary DNS'
          type: DEPENDENT
          key: hikvision.dvr.net.dns.primary
          value_type: TEXT
          preprocessing:
            - type: XMLPATH
              parameters:
                - 'string((//*[local-name()=''PrimaryDNS'']//*[local-name()=''ipAddress''])[1])'
          master_item:
            key: hikvision.dvr.network.interfaces
        - uuid: 9fa25c28309b47ad9fa083bbd0eb8797
          name: 'Secondary DNS'
          type: DEPENDENT
          key: hikvision.dvr.net.dns.secondary
          value_type: TEXT
          preprocessing:
            - type: XMLPATH
              parameters:
                - 'string((//*[local-name()=''SecondaryDNS'']//*[local-name()=''ipAddress''])[1])'
