zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: d37f71c7e3f7469bab645852a69a2018
      name: 'Templates/Video surveillance'
  templates:
    - uuid: 518cda00eb414852a5d5965c71cacbb5
      template: 'Template Hikvision DVR-NVR ISAPI'
      name: 'Template Hikvision DVR-NVR ISAPI'
      groups:
        - name: 'Templates/Video surveillance'
      items:
        - uuid: 7cf8d93c42264342844c483b91e3a6f5
          name: 'Firmware version'
          type: DEPENDENT
          key: hikvision.dvr.firmware
          value_type: TEXT
          preprocessing:
