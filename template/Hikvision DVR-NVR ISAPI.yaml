          preprocessing:
            - type: XMLPATH
              parameters:
                - 'number((//*[local-name()=''MTU''])[1])'
          master_item:
            key: hikvision.dvr.network.interfaces
        - uuid: 72bb5b916cb2434b884d58764a2f233b
          name: 'Subnet mask'
          type: DEPENDENT
