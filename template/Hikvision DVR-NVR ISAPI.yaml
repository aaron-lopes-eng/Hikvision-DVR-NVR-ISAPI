              parameters:
                - 'string(//*[local-name()=''firmwareVersion''])'
          master_item:
            key: hikvision.dvr.system.deviceinfo
          triggers:
            - uuid: 75a211ba788047cb8c7d429d69b0acff
              expression: 'last(/Template Hikvision DVR-NVR ISAPI/hikvision.dvr.firmware)<>last(/Template Hikvision DVR-NVR ISAPI/hikvision.dvr.firmware,#2)'
